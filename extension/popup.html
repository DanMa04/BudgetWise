<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kallio</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div id="app">
    <div class="header">
      <div class="logo">
        <div class="logo-icon">K</div>
        <span class="logo-text">Kallio</span>
      </div>
      <div id="status-dot" class="status-dot"></div>
    </div>

    <div id="not-connected-view" class="view" style="display:none;">
      <p class="login-message">Connect Kallio to your account to get budget warnings while shopping.</p>
      <button id="open-settings-btn" class="btn btn-primary">Connect to Kallio</button>
    </div>

    <div id="budget-view" class="view" style="display:none;">
      <div class="budget-summary">
        <div class="budget-total">
          <span class="budget-label">Budget Remaining</span>
          <span id="remaining-amount" class="budget-amount">$0.00</span>
        </div>
        <div class="progress-bar">
          <div id="progress-fill" class="progress-fill"></div>
        </div>
        <div class="progress-labels">
          <span id="spent-label">$0 spent</span>
          <span id="budget-label">of $0</span>
        </div>
      </div>

      <div id="budget-list" class="budget-list"></div>

      <div class="notifications-toggle">
        <label class="toggle-row">
          <span>Enable warnings</span>
          <input type="checkbox" id="toggle-notifications">
        </label>
      </div>

      <div class="footer-actions">
        <a id="open-kallio-link" href="http://localhost:5173" target="_blank" class="btn btn-secondary">Open Kallio</a>
        <button id="disconnect-btn" class="btn btn-danger-text">Disconnect</button>
      </div>
    </div>
  </div>
  <script src="dist/popup.js" type="module"></script>
</body>
</html>
