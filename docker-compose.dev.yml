services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-budgetwise}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-budgetwise}
      POSTGRES_DB: ${POSTGRES_DB:-budgetwise}
    ports:
      - "5432:5432"
    volumes:
      - pgdata_dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-budgetwise}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
      target: dev
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-budgetwise}:${POSTGRES_PASSWORD:-budgetwise}@db:5432/${POSTGRES_DB:-budgetwise}
      DATABASE_URL_SYNC: postgresql://${POSTGRES_USER:-budgetwise}:${POSTGRES_PASSWORD:-budgetwise}@db:5432/${POSTGRES_DB:-budgetwise}
      CLERK_SECRET_KEY: ${CLERK_SECRET_KEY:-sk_test_placeholder}
      SECRET_KEY: ${SECRET_KEY:-dev-secret-key}
      FRONTEND_URL: http://localhost:5173
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    depends_on:
      db:
        condition: service_healthy
    command: uv run uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload --reload-dir app

  frontend:
    image: node:22-alpine
    working_dir: /app
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    environment:
      VITE_CLERK_PUBLISHABLE_KEY: ${VITE_CLERK_PUBLISHABLE_KEY:-pk_test_placeholder}
      VITE_API_URL: http://localhost:8000
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    depends_on:
      - backend

volumes:
  pgdata_dev:
  frontend_node_modules:
